{% extends "entreprise/base_entreprise.html" %}
{% block title %}Statistiques — Swift{% endblock %}
{% block content %}
<div class="page-title" style="margin-bottom:24px;">
  📈 Statistiques
</div>
<div class="card">
  <div class="card-title">CA des 7 derniers jours</div>
  <div style="display:flex;align-items:flex-end;
              gap:12px;height:160px;padding-top:16px;">
    {% for s in stats_7j %}
    <div style="flex:1;display:flex;
                flex-direction:column;align-items:center;
                gap:6px;">
      <div style="font-size:11px;color:#FF6B00;
                  font-weight:700;">
        {% if s.ca > 0 %}{{ s.ca|floatformat:0 }}{% endif %}
      </div>
      <div style="width:100%;
                  background:#FF6B00;border-radius:6px 6px 0 0;
                  min-height:4px;
                  height:{% widthratio s.ca 1000 120 %}px;">
      </div>
      <div style="font-size:11px;color:#999;">{{ s.jour }}</div>
    </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
